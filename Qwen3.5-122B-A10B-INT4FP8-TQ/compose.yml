services:
  model-prep:
    build: ../Qwen3.5-122B-A10B-INT4FP8/prep/
    volumes:
      - ${HOME}/models:/models
    environment:
      HF_HOME: /models
  vllm:
    build: .
    image: docker.internal.phis.nl/vllm-qwen35-122b-a10b-int4fp8-tq:0.19.0
    platform: linux/arm64
    network_mode: host
    ipc: host
    depends_on:
      model-prep:
        condition: service_completed_successfully
    volumes:
      - ${HOME}/models:/models
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
