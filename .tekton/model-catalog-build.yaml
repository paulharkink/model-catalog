apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: model-catalog-build
  namespace: ci
spec:
  params:
    - name: repo_url
      type: string
    - name: revision
      type: string
  workspaces:
    - name: source
    - name: eugr
  tasks:
    - name: ensure-vllm-eugr
      taskSpec:
        workspaces:
          - name: eugr
        volumes:
          - name: github-app
            secret:
              secretName: ci-github-app
          - name: github-helper
            configMap:
              name: github-app-helper
              defaultMode: 0755
          - name: docker-config
            secret:
              secretName: docker-internal-registry
              items:
                - key: .dockerconfigjson
                  path: config.json
        results:
          - name: image
            description: vllm-eugr image label for INT4FP8 builds
        steps:
          - name: check-and-prepare
            image: alpine/git:2.45.2
            computeResources:
              requests: { cpu: "250m", memory: "256Mi" }
              limits: { cpu: "1", memory: "1Gi" }
            volumeMounts:
              - name: github-app
                mountPath: /var/secrets/github-app
              - name: github-helper
                mountPath: /helpers
              - name: docker-config
                mountPath: /docker-config
            script: |
              set -eux
              apk add --no-cache openssl curl jq python3 >/dev/null 2>&1
              SHORT=49d6d9fe
              PATCH_COMMANDS='["sed -i '"'"'/^# TEMPORARY PATCH for broken FP8 kernels/,/rm pr35568.diff/d'"'"' Dockerfile","sed -i '"'"'/^# TEMPORARY PATCH for broken compilation/,/rm pr38919.diff/d'"'"' Dockerfile","sed -i '"'"'s|whl/nightly/cu130|whl/nightly/20260408/cu130|g'"'"' Dockerfile","sed -i '"'"'/^ENV TORCH_CUDA_ARCH_LIST=/a ENV NVCC_APPEND_FLAGS=\"-t 4\"'"'"' Dockerfile"]'
              HASH=$(printf '%s' "${PATCH_COMMANDS}" | sha256sum | cut -c1-8)
              IMAGE="docker.internal.phis.nl/vllm-eugr:${SHORT}-${HASH}"
              printf '%s' "${IMAGE}" > /tekton/results/image
              mkdir -p "$(workspaces.eugr.path)/meta"
              printf '%s' "${IMAGE}" > "$(workspaces.eugr.path)/meta/image"

              AUTH=$(python3 -c "import json; d=json.load(open('/docker-config/config.json')); print(d['auths']['docker.internal.phis.nl']['auth'])" 2>/dev/null || echo "")
              STATUS="000"
              if [ -n "${AUTH}" ]; then
                STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
                  -H "Authorization: Basic ${AUTH}" \
                  -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
                  "https://docker.internal.phis.nl/v2/vllm-eugr/manifests/${SHORT}-${HASH}" 2>/dev/null || echo "000")
              fi

              if [ "${STATUS}" = "200" ]; then
                echo "vllm-eugr ${IMAGE} already in nexus, no build needed."
                printf 'true' > "$(workspaces.eugr.path)/meta/skip"
                exit 0
              fi

              printf 'false' > "$(workspaces.eugr.path)/meta/skip"
              TOKEN=$(/helpers/github-app-token.sh /var/secrets/github-app)
              rm -rf "$(workspaces.eugr.path)/src"
              git clone "https://x-access-token:${TOKEN}@github.com/eugr/spark-vllm-docker.git" \
                "$(workspaces.eugr.path)/src"
              cd "$(workspaces.eugr.path)/src"
              git checkout 49d6d9fefd7cd05e63af8b28e4b514e9d30d249f
              printf '%s' "${PATCH_COMMANDS}" | python3 -c "
              import json, sys, subprocess
              for cmd in json.load(sys.stdin):
                  print('Applying:', cmd)
                  subprocess.run(['sh', '-c', cmd], check=True)
              " || { echo 'Patch application failed'; exit 1; }

          - name: build
            image: gcr.io/kaniko-project/executor:debug
            computeResources:
              requests: { cpu: "4", memory: "16Gi" }
              limits: { cpu: "8", memory: "32Gi" }
            timeout: 5400s
            env:
              - name: DOCKER_CONFIG
                value: /kaniko/.docker
            volumeMounts:
              - name: docker-config
                mountPath: /kaniko/.docker
            command: ["/busybox/sh", "-c"]
            args:
              - |
                set -eux
                read -r SKIP < "$(workspaces.eugr.path)/meta/skip" || SKIP=false
                echo "SKIP=${SKIP}"
                if [ "${SKIP}" = "true" ]; then
                  echo "vllm-eugr image already exists, skipping build."
                  exit 0
                fi
                read -r IMAGE < "$(workspaces.eugr.path)/meta/image"
                echo "Building ${IMAGE}"
                /kaniko/executor \
                  --dockerfile="$(workspaces.eugr.path)/src/Dockerfile" \
                  --context="$(workspaces.eugr.path)/src" \
                  --destination="${IMAGE}" \
                  --skip-tls-verify \
                  --cache=false || {
                    echo "WARNING: vllm-eugr build failed — INT4FP8 images will not be built this run."
                    exit 0
                  }
      workspaces:
        - name: eugr
          workspace: eugr

    - name: build-and-push
      runAfter: [ensure-vllm-eugr]
      taskSpec:
        params:
          - name: repo_url
            type: string
          - name: revision
            type: string
          - name: vllm_eugr_image
            type: string
        workspaces:
          - name: source
        volumes:
          - name: github-app
            secret:
              secretName: ci-github-app
          - name: github-helper
            configMap:
              name: github-app-helper
              defaultMode: 0755
          - name: docker-config
            secret:
              secretName: docker-internal-registry
              items:
                - key: .dockerconfigjson
                  path: config.json
        steps:
          - name: clone
            image: alpine/git:2.45.2
            computeResources:
              requests: { cpu: "250m", memory: "256Mi" }
              limits: { cpu: "1", memory: "1Gi" }
            volumeMounts:
              - name: github-app
                mountPath: /var/secrets/github-app
              - name: github-helper
                mountPath: /helpers
            script: |
              set -eux
              apk add --no-cache openssl curl jq >/dev/null 2>&1
              TOKEN=$(/helpers/github-app-token.sh /var/secrets/github-app)
              REPO_PATH=$(printf "%s" "$(params.repo_url)" | sed -e 's#^https://github.com/##' -e 's#^git@github.com:##' -e 's#\.git$##')
              CLONE_URL="https://x-access-token:${TOKEN}@github.com/${REPO_PATH}.git"
              rm -rf "$(workspaces.source.path)/src"
              git clone "${CLONE_URL}" "$(workspaces.source.path)/src"
              cd "$(workspaces.source.path)/src"
              git checkout "$(params.revision)"

          - name: build-and-push-qwen36-nvfp4
            image: gcr.io/kaniko-project/executor:debug
            computeResources:
              requests: { cpu: "2", memory: "4Gi" }
              limits: { cpu: "8", memory: "16Gi" }
            env:
              - name: DOCKER_CONFIG
                value: /kaniko/.docker
            volumeMounts:
              - name: docker-config
                mountPath: /kaniko/.docker
            command: ["/busybox/sh", "-c"]
            args:
              - |
                set -eux
                DEST=$(grep 'image:' /workspace/source/src/Qwen3.6-27B-NVFP4/compose.yml | awk '{print $2}')
                /kaniko/executor \
                  --dockerfile=/workspace/source/src/Qwen3.6-27B-NVFP4/Dockerfile \
                  --context=/workspace/source/src/Qwen3.6-27B-NVFP4 \
                  --destination="${DEST}" \
                  --skip-tls-verify \
                  --cache=false

          - name: build-and-push-qwen36-35b-a3b-nvfp4
            image: gcr.io/kaniko-project/executor:debug
            computeResources:
              requests: { cpu: "2", memory: "4Gi" }
              limits: { cpu: "8", memory: "16Gi" }
            env:
              - name: DOCKER_CONFIG
                value: /kaniko/.docker
            volumeMounts:
              - name: docker-config
                mountPath: /kaniko/.docker
            command: ["/busybox/sh", "-c"]
            args:
              - |
                set -eux
                DEST=$(grep 'image:' /workspace/source/src/Qwen3.6-35B-A3B-NVFP4/compose.yml | awk '{print $2}')
                /kaniko/executor \
                  --dockerfile=/workspace/source/src/Qwen3.6-35B-A3B-NVFP4/Dockerfile \
                  --context=/workspace/source/src/Qwen3.6-35B-A3B-NVFP4 \
                  --destination="${DEST}" \
                  --skip-tls-verify \
                  --cache=false

          - name: build-and-push-qwen35-122b-a10b-nvfp4
            image: gcr.io/kaniko-project/executor:debug
            computeResources:
              requests: { cpu: "2", memory: "4Gi" }
              limits: { cpu: "8", memory: "16Gi" }
            env:
              - name: DOCKER_CONFIG
                value: /kaniko/.docker
            volumeMounts:
              - name: docker-config
                mountPath: /kaniko/.docker
            command: ["/busybox/sh", "-c"]
            args:
              - |
                set -eux
                DEST=$(grep 'image:' /workspace/source/src/Qwen3.5-122B-A10B-NVFP4/compose.yml | awk '{print $2}')
                /kaniko/executor \
                  --dockerfile=/workspace/source/src/Qwen3.5-122B-A10B-NVFP4/Dockerfile \
                  --context=/workspace/source/src/Qwen3.5-122B-A10B-NVFP4 \
                  --destination="${DEST}" \
                  --skip-tls-verify \
                  --cache=false

          - name: build-and-push-qwen35-122b-int4fp8
            image: gcr.io/kaniko-project/executor:debug
            computeResources:
              requests: { cpu: "2", memory: "4Gi" }
              limits: { cpu: "8", memory: "16Gi" }
            env:
              - name: DOCKER_CONFIG
                value: /kaniko/.docker
            volumeMounts:
              - name: docker-config
                mountPath: /kaniko/.docker
            command: ["/busybox/sh", "-c"]
            args:
              - |
                set -eux
                DEST=$(grep 'image:' /workspace/source/src/Qwen3.5-122B-A10B-INT4FP8/compose.yml | awk '{print $2}')
                /kaniko/executor \
                  --dockerfile=/workspace/source/src/Qwen3.5-122B-A10B-INT4FP8/Dockerfile \
                  --context=/workspace/source/src/Qwen3.5-122B-A10B-INT4FP8 \
                  --build-arg "BASE_IMAGE=$(params.vllm_eugr_image)" \
                  --destination="${DEST}" \
                  --skip-tls-verify \
                  --cache=false

          - name: build-and-push-qwen35-122b-int4fp8-tq
            image: gcr.io/kaniko-project/executor:debug
            computeResources:
              requests: { cpu: "2", memory: "4Gi" }
              limits: { cpu: "8", memory: "16Gi" }
            env:
              - name: DOCKER_CONFIG
                value: /kaniko/.docker
            volumeMounts:
              - name: docker-config
                mountPath: /kaniko/.docker
            command: ["/busybox/sh", "-c"]
            args:
              - |
                set -eux
                DEST=$(grep 'image:' /workspace/source/src/Qwen3.5-122B-A10B-INT4FP8-TQ/compose.yml | awk '{print $2}')
                /kaniko/executor \
                  --dockerfile=/workspace/source/src/Qwen3.5-122B-A10B-INT4FP8-TQ/Dockerfile \
                  --context=/workspace/source/src/Qwen3.5-122B-A10B-INT4FP8-TQ \
                  --build-arg "BASE_IMAGE=$(params.vllm_eugr_image)" \
                  --destination="${DEST}" \
                  --skip-tls-verify \
                  --cache=false

          - name: build-and-push-qwen35-122b-int4fp8-prep
            image: gcr.io/kaniko-project/executor:debug
            computeResources:
              requests: { cpu: "2", memory: "4Gi" }
              limits: { cpu: "8", memory: "16Gi" }
            env:
              - name: DOCKER_CONFIG
                value: /kaniko/.docker
            volumeMounts:
              - name: docker-config
                mountPath: /kaniko/.docker
            command: ["/busybox/sh", "-c"]
            args:
              - |
                set -eux
                /kaniko/executor \
                  --dockerfile=/workspace/source/src/Qwen3.5-122B-A10B-INT4FP8/prep/Dockerfile \
                  --context=/workspace/source/src/Qwen3.5-122B-A10B-INT4FP8/prep \
                  --destination=docker.internal.phis.nl/vllm-qwen35-122b-int4fp8-prep:0.19.0 \
                  --skip-tls-verify \
                  --cache=false

          - name: helm-push
            image: alpine/helm:3.17.0
            computeResources:
              requests: { cpu: "250m", memory: "256Mi" }
              limits: { cpu: "1", memory: "512Mi" }
            env:
              - name: DOCKER_CONFIG
                value: /helm-docker
              - name: HELM_REGISTRY_CONFIG
                value: /helm-docker/config.json
            volumeMounts:
              - name: docker-config
                mountPath: /helm-docker
            script: |
              set -eux
              mkdir -p /tmp/charts
              helm package "$(workspaces.source.path)/src" --destination /tmp/charts
              helm push /tmp/charts/model-catalog-*.tgz \
                oci://docker.internal.phis.nl/charts \
                --insecure-skip-tls-verify
      params:
        - name: repo_url
          value: $(params.repo_url)
        - name: revision
          value: $(params.revision)
        - name: vllm_eugr_image
          value: $(tasks.ensure-vllm-eugr.results.image)
      workspaces:
        - name: source
          workspace: source
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: model-catalog-build-main-
  namespace: ci
  annotations:
    pipelinesascode.tekton.dev/on-cel-expression: 'event == "push" && (target_branch == "main" || target_branch == "refs/heads/main")'
    pipelinesascode.tekton.dev/max-keep-runs: "5"
spec:
  pipelineRef:
    name: model-catalog-build
  taskRunTemplate:
    serviceAccountName: tekton-runner
    podTemplate:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/gpu-worker
                    operator: Exists
  params:
    - name: repo_url
      value: "{{ repo_url }}"
    - name: revision
      value: "{{ revision }}"
  workspaces:
    - name: source
      emptyDir: {}
    - name: eugr
      emptyDir: {}
