services:
  vllm:
    build: .
    image: docker.internal.phis.nl/gemma4-26b-a4b-nvfp4-vllm:0.19.0
    network_mode: host
    ipc: host
    environment:
      VLLM_NVFP4_GEMM_BACKEND: marlin
      HF_HOME: /models
      HF_HUB_CACHE: /models
    volumes:
      - ${HOME}/models:/models
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
