apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: vllm-eugr-build
  namespace: ci
  annotations:
    description: |
      Manually-triggered pipeline to build and push a vllm-eugr base image.
      Image label: docker.internal.phis.nl/vllm-eugr:<commit_short>-<patches_hash>
      Idempotent: skips build if image already exists in nexus.
spec:
  params:
    - name: commit
      type: string
      description: eugr/spark-vllm-docker git commit hash
    - name: torch_nightly_date
      type: string
      description: PyTorch nightly date string (e.g., 20260408)
    - name: patch_commands
      type: string
      description: JSON array of sh commands to apply to Dockerfile before build
  workspaces:
    - name: eugr
  results:
    - name: image
      description: vllm-eugr image label (always set, even when skipped)
      value: $(tasks.check-and-prepare.results.image)
  tasks:
    - name: check-and-prepare
      taskSpec:
        params:
          - name: commit
            type: string
          - name: torch_nightly_date
            type: string
          - name: patch_commands
            type: string
        workspaces:
          - name: eugr
        volumes:
          - name: github-app
            secret:
              secretName: ci-github-app
          - name: github-helper
            configMap:
              name: github-app-helper
              defaultMode: 0755
          - name: docker-config
            secret:
              secretName: docker-internal-registry
              items:
                - key: .dockerconfigjson
                  path: config.json
        results:
          - name: image
            description: Computed vllm-eugr image label
          - name: skip
            description: "'true' if image already exists in nexus, 'false' if build is needed"
        steps:
          - name: check
            image: alpine/git:2.45.2
            computeResources:
              requests: { cpu: "250m", memory: "256Mi" }
              limits: { cpu: "1", memory: "1Gi" }
            volumeMounts:
              - name: github-app
                mountPath: /var/secrets/github-app
              - name: github-helper
                mountPath: /helpers
              - name: docker-config
                mountPath: /docker-config
            script: |
              set -eux
              apk add --no-cache openssl curl jq python3 >/dev/null 2>&1
              SHORT=$(printf '%s' "$(params.commit)" | cut -c1-8)
              HASH=$(printf '%s' '$(params.patch_commands)' | sha256sum | cut -c1-8)
              IMAGE="docker.internal.phis.nl/vllm-eugr:${SHORT}-${HASH}"
              printf '%s' "${IMAGE}" > /tekton/results/image
              mkdir -p "$(workspaces.eugr.path)/meta"
              printf '%s\n' "${IMAGE}" > "$(workspaces.eugr.path)/meta/image"

              AUTH=$(python3 -c "import json; d=json.load(open('/docker-config/config.json')); print(d['auths']['docker.internal.phis.nl']['auth'])" 2>/dev/null || echo "")
              STATUS="000"
              if [ -n "${AUTH}" ]; then
                STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
                  -H "Authorization: Basic ${AUTH}" \
                  -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
                  "https://docker.internal.phis.nl/v2/vllm-eugr/manifests/${SHORT}-${HASH}" 2>/dev/null || echo "000")
              fi

              if [ "${STATUS}" = "200" ]; then
                echo "Image ${IMAGE} already exists in nexus, skipping build."
                printf 'true' > /tekton/results/skip
                printf 'true\n' > "$(workspaces.eugr.path)/meta/skip"
                exit 0
              fi

              printf 'false' > /tekton/results/skip
              printf 'false\n' > "$(workspaces.eugr.path)/meta/skip"

              TOKEN=$(/helpers/github-app-token.sh /var/secrets/github-app)
              rm -rf "$(workspaces.eugr.path)/src"
              git clone "https://x-access-token:${TOKEN}@github.com/eugr/spark-vllm-docker.git" \
                "$(workspaces.eugr.path)/src"
              cd "$(workspaces.eugr.path)/src"
              git checkout "$(params.commit)"

              printf '%s' '$(params.patch_commands)' | python3 -c "
              import json, sys, subprocess
              cmds = json.load(sys.stdin)
              for cmd in cmds:
                  print('Applying:', cmd)
                  subprocess.run(['sh', '-c', cmd], check=True)
              " || { echo 'Patch application failed'; exit 1; }

              printf 'build_date: $(params.torch_nightly_date)\ncommit: $(params.commit)\n' \
                > "$(workspaces.eugr.path)/src/build-metadata.yaml"
      params:
        - name: commit
          value: $(params.commit)
        - name: torch_nightly_date
          value: $(params.torch_nightly_date)
        - name: patch_commands
          value: $(params.patch_commands)
      workspaces:
        - name: eugr
          workspace: eugr

    - name: kaniko-build
      when:
        - input: $(tasks.check-and-prepare.results.skip)
          operator: in
          values: ["false"]
      runAfter: [check-and-prepare]
      taskSpec:
        workspaces:
          - name: eugr
        volumes:
          - name: docker-config
            secret:
              secretName: docker-internal-registry
              items:
                - key: .dockerconfigjson
                  path: config.json
        steps:
          - name: build
            image: gcr.io/kaniko-project/executor:debug
            computeResources:
              requests: { cpu: "4", memory: "16Gi" }
              limits: { cpu: "8", memory: "32Gi" }
            timeout: 5400s
            env:
              - name: DOCKER_CONFIG
                value: /kaniko/.docker
            volumeMounts:
              - name: docker-config
                mountPath: /kaniko/.docker
            command: ["/busybox/sh", "-c"]
            args:
              - |
                set -eu
                read -r IMAGE < "$(workspaces.eugr.path)/meta/image"
                /kaniko/executor \
                  --dockerfile="$(workspaces.eugr.path)/src/Dockerfile" \
                  --context="$(workspaces.eugr.path)/src" \
                  --destination="${IMAGE}" \
                  --skip-tls-verify \
                  --cache=false
      workspaces:
        - name: eugr
          workspace: eugr
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: vllm-eugr-build-int4fp8-
  namespace: ci
  annotations:
    description: |
      Manual trigger example for the INT4FP8 vllm-eugr base image.
      Run: kubectl create -f this-file (with generateName it creates a new PipelineRun each time).
spec:
  pipelineRef:
    name: vllm-eugr-build
  taskRunTemplate:
    serviceAccountName: tekton-runner
    podTemplate:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/gpu-worker
                    operator: Exists
  params:
    - name: commit
      value: "49d6d9fefd7cd05e63af8b28e4b514e9d30d249f"
    - name: torch_nightly_date
      value: "20260408"
    - name: patch_commands
      value: |
        ["sed -i '/^# TEMPORARY PATCH for broken FP8 kernels/,/rm pr35568.diff/d' Dockerfile","sed -i '/^# TEMPORARY PATCH for broken compilation/,/rm pr38919.diff/d' Dockerfile","sed -i 's|whl/nightly/cu130|whl/nightly/20260408/cu130|g' Dockerfile","sed -i '/^ENV TORCH_CUDA_ARCH_LIST=/a ENV NVCC_APPEND_FLAGS=\"-t 4\"' Dockerfile"]
  workspaces:
    - name: eugr
      emptyDir: {}
