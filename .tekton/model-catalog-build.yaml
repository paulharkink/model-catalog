apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: model-catalog-build
  namespace: ci
spec:
  params:
    - name: repo_url
      type: string
    - name: revision
      type: string
  workspaces:
    - name: source
  tasks:
    - name: build-and-push
      taskSpec:
        params:
          - name: repo_url
            type: string
          - name: revision
            type: string
        workspaces:
          - name: source
        volumes:
          - name: github-app
            secret:
              secretName: ci-github-app
          - name: github-helper
            configMap:
              name: github-app-helper
              defaultMode: 0755
          - name: docker-config
            secret:
              secretName: docker-internal-registry
              items:
                - key: .dockerconfigjson
                  path: config.json
          - name: docker-socket
            hostPath:
              path: /var/run/docker.sock
              type: Socket
          - name: models
            hostPath:
              path: /home/pharkink/models
              type: Directory
          - name: pip-cache
            hostPath:
              path: /home/pharkink/.cache/pip
              type: DirectoryOrCreate
        steps:
          - name: clone
            image: alpine/git:2.45.2
            computeResources:
              requests: { cpu: "250m", memory: "256Mi" }
              limits: { cpu: "1", memory: "1Gi" }
            volumeMounts:
              - name: github-app
                mountPath: /var/secrets/github-app
              - name: github-helper
                mountPath: /helpers
            script: |
              set -eux
              apk add --no-cache openssl curl jq >/dev/null 2>&1
              TOKEN=$(/helpers/github-app-token.sh /var/secrets/github-app)
              REPO_PATH=$(printf "%s" "$(params.repo_url)" | sed -e 's#^https://github.com/##' -e 's#^git@github.com:##' -e 's#\.git$##')
              CLONE_URL="https://x-access-token:${TOKEN}@github.com/${REPO_PATH}.git"
              rm -rf "$(workspaces.source.path)/src"
              git clone "${CLONE_URL}" "$(workspaces.source.path)/src"
              cd "$(workspaces.source.path)/src"
              git checkout "$(params.revision)"

              # Detect which model directories changed vs parent commit
              mkdir -p "$(workspaces.source.path)/meta/build-flags"
              PREV=$(git rev-parse HEAD~1 2>/dev/null || true)
              if [ -z "${PREV}" ]; then
                echo "No parent commit — flagging all models for build"
                touch \
                  "$(workspaces.source.path)/meta/build-flags/qwen36-27b-nvfp4" \
                  "$(workspaces.source.path)/meta/build-flags/qwen36-35b-a3b-nvfp4" \
                  "$(workspaces.source.path)/meta/build-flags/qwen35-122b-a10b-nvfp4" \
                  "$(workspaces.source.path)/meta/build-flags/qwen35-122b-a10b-int4fp8" \
                  "$(workspaces.source.path)/meta/build-flags/gemma4-26b-a4b-nvfp4" \
                  "$(workspaces.source.path)/meta/build-flags/qwen25-32b-gguf-q4km-tq"
              else
                CHANGED=$(git diff --name-only "${PREV}" HEAD)
                echo "Changed files: ${CHANGED}"
                echo "${CHANGED}" | grep -q '^Qwen3\.6-27B-NVFP4/'        && touch "$(workspaces.source.path)/meta/build-flags/qwen36-27b-nvfp4"         || true
                echo "${CHANGED}" | grep -q '^Qwen3\.6-35B-A3B-NVFP4/'    && touch "$(workspaces.source.path)/meta/build-flags/qwen36-35b-a3b-nvfp4"     || true
                echo "${CHANGED}" | grep -q '^Qwen3\.5-122B-A10B-NVFP4/'  && touch "$(workspaces.source.path)/meta/build-flags/qwen35-122b-a10b-nvfp4"   || true
                echo "${CHANGED}" | grep -q '^Qwen3\.5-122B-A10B-INT4FP8' && touch "$(workspaces.source.path)/meta/build-flags/qwen35-122b-a10b-int4fp8" || true
                echo "${CHANGED}" | grep -q '^Gemma-4-26B-A4B-it-NVFP4/'  && touch "$(workspaces.source.path)/meta/build-flags/gemma4-26b-a4b-nvfp4"     || true
                echo "${CHANGED}" | grep -q '^Qwen2\.5-32B-Instruct-GGUF' && touch "$(workspaces.source.path)/meta/build-flags/qwen25-32b-gguf-q4km-tq"  || true
              fi
              echo "Build flags set:"
              ls "$(workspaces.source.path)/meta/build-flags/" || echo "(none)"

          - name: build-and-push-qwen36-nvfp4
            image: gcr.io/kaniko-project/executor:debug
            computeResources:
              requests: { cpu: "2", memory: "4Gi" }
              limits: { cpu: "8", memory: "16Gi" }
            env:
              - name: DOCKER_CONFIG
                value: /kaniko/.docker
            volumeMounts:
              - name: docker-config
                mountPath: /kaniko/.docker
            command: ["/busybox/sh", "-c"]
            args:
              - |
                [ ! -f "$(workspaces.source.path)/meta/build-flags/qwen36-27b-nvfp4" ] && { echo "Skipping Qwen3.6-27B-NVFP4 — no changes detected"; exit 0; } || true
                set -eux
                DEST=$(grep 'image:' /workspace/source/src/Qwen3.6-27B-NVFP4/compose.yml | awk '{print $2}')
                /kaniko/executor \
                  --dockerfile=/workspace/source/src/Qwen3.6-27B-NVFP4/Dockerfile \
                  --context=/workspace/source/src/Qwen3.6-27B-NVFP4 \
                  --destination="${DEST}" \
                  --skip-tls-verify \
                  --cache=false

          - name: build-and-push-qwen36-35b-a3b-nvfp4
            image: gcr.io/kaniko-project/executor:debug
            computeResources:
              requests: { cpu: "2", memory: "4Gi" }
              limits: { cpu: "8", memory: "16Gi" }
            env:
              - name: DOCKER_CONFIG
                value: /kaniko/.docker
            volumeMounts:
              - name: docker-config
                mountPath: /kaniko/.docker
            command: ["/busybox/sh", "-c"]
            args:
              - |
                [ ! -f "$(workspaces.source.path)/meta/build-flags/qwen36-35b-a3b-nvfp4" ] && { echo "Skipping Qwen3.6-35B-A3B-NVFP4 — no changes detected"; exit 0; } || true
                set -eux
                DEST=$(grep 'image:' /workspace/source/src/Qwen3.6-35B-A3B-NVFP4/compose.yml | awk '{print $2}')
                /kaniko/executor \
                  --dockerfile=/workspace/source/src/Qwen3.6-35B-A3B-NVFP4/Dockerfile \
                  --context=/workspace/source/src/Qwen3.6-35B-A3B-NVFP4 \
                  --destination="${DEST}" \
                  --skip-tls-verify \
                  --cache=false

          - name: build-and-push-qwen35-122b-a10b-nvfp4
            image: gcr.io/kaniko-project/executor:debug
            computeResources:
              requests: { cpu: "2", memory: "4Gi" }
              limits: { cpu: "8", memory: "16Gi" }
            env:
              - name: DOCKER_CONFIG
                value: /kaniko/.docker
            volumeMounts:
              - name: docker-config
                mountPath: /kaniko/.docker
            command: ["/busybox/sh", "-c"]
            args:
              - |
                [ ! -f "$(workspaces.source.path)/meta/build-flags/qwen35-122b-a10b-nvfp4" ] && { echo "Skipping Qwen3.5-122B-A10B-NVFP4 — no changes detected"; exit 0; } || true
                set -eux
                DEST=$(grep 'image:' /workspace/source/src/Qwen3.5-122B-A10B-NVFP4/compose.yml | awk '{print $2}')
                /kaniko/executor \
                  --dockerfile=/workspace/source/src/Qwen3.5-122B-A10B-NVFP4/Dockerfile \
                  --context=/workspace/source/src/Qwen3.5-122B-A10B-NVFP4 \
                  --destination="${DEST}" \
                  --skip-tls-verify \
                  --cache=false

          - name: build-and-push-qwen35-122b-a10b-int4fp8
            image: ubuntu:22.04
            computeResources:
              requests: { cpu: "2", memory: "8Gi" }
              limits: { cpu: "4", memory: "16Gi" }
            env:
              - name: HOME
                value: /root
              - name: USER
                value: root
              - name: HF_HOME
                value: /root/models
              - name: HF_HUB_CACHE
                value: /root/models
              - name: HF_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: ai-huggingface-token
                    key: access_token
              - name: DOCKER_HOST
                value: unix:///var/run/docker.sock
              - name: DOCKER_CONFIG
                value: /docker-config
              - name: PIP_CACHE_DIR
                value: /pip-cache
              - name: DEBIAN_FRONTEND
                value: noninteractive
            volumeMounts:
              - name: docker-socket
                mountPath: /var/run/docker.sock
              - name: models
                mountPath: /root/models
              - name: docker-config
                mountPath: /docker-config
              - name: pip-cache
                mountPath: /pip-cache
            script: |
              [ ! -f "$(workspaces.source.path)/meta/build-flags/qwen35-122b-a10b-int4fp8" ] && { echo "Skipping Qwen3.5-122B-A10B-INT4FP8 — no changes detected"; exit 0; } || true
              set -eux
              # Install docker-ce-cli + buildx (required by albond's install.sh which uses `docker build --output`)
              apt-get update -qq && apt-get install -y --no-install-recommends \
                ca-certificates curl gnupg python3 python3-pip python3-venv git >/dev/null
              install -m0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc 2>/dev/null
              chmod a+r /etc/apt/keyrings/docker.asc
              ARCH=$(dpkg --print-architecture)
              CODENAME=$(. /etc/os-release && echo "${VERSION_CODENAME}")
              echo "deb [arch=${ARCH} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu ${CODENAME} stable" > /etc/apt/sources.list.d/docker.list
              apt-get update -qq && apt-get install -y --no-install-recommends docker-ce-cli docker-buildx-plugin >/dev/null

              # All version pins come from versions.env in the checked-out repo
              . "$(workspaces.source.path)/src/versions.env"
              NEXUS_TAG=$(printf '%s' "${ALBOND_INT4FP8_TAG}" | tr '[:upper:]' '[:lower:]')

              # Pre-pull albond's vllm base image as a speedup only — install.sh will skip
              # building vllm-sm121 if the image already exists locally.
              docker pull "docker.internal.phis.nl/albond-sm121-vllm:${NEXUS_TAG}" 2>/dev/null \
                && docker tag "docker.internal.phis.nl/albond-sm121-vllm:${NEXUS_TAG}" vllm-sm121:latest \
                || echo "vllm-sm121 not in nexus yet, install.sh will build it"

              # Clone albond's repo at the declared tag and run install.sh verbatim.
              # install.sh skips each step whose output already exists.
              rm -rf /tmp/albond
              git clone https://github.com/albond/DGX_Spark_Qwen3.5-122B-A10B-AR-INT4.git /tmp/albond
              cd /tmp/albond
              git checkout "${ALBOND_INT4FP8_TAG}"
              bash ./install.sh --no-launch

              # Build TQ variant (install.sh builds v2 only, not v2-tq)
              if ! docker image inspect vllm-qwen35-v2-tq:latest >/dev/null 2>&1; then
                docker build -t vllm-qwen35-v2-tq -f docker/Dockerfile.v2-tq .
              fi

              # Retag and push to nexus
              docker tag vllm-sm121:latest "docker.internal.phis.nl/albond-sm121-vllm:${NEXUS_TAG}"
              docker push "docker.internal.phis.nl/albond-sm121-vllm:${NEXUS_TAG}"
              docker tag vllm-qwen35-v2:latest docker.internal.phis.nl/vllm-qwen35-122b-a10b-int4fp8:0.19.0
              docker push docker.internal.phis.nl/vllm-qwen35-122b-a10b-int4fp8:0.19.0
              docker tag vllm-qwen35-v2-tq:latest docker.internal.phis.nl/vllm-qwen35-122b-a10b-int4fp8-tq:0.19.0
              docker push docker.internal.phis.nl/vllm-qwen35-122b-a10b-int4fp8-tq:0.19.0

          - name: helm-push
            image: alpine/helm:3.17.0
            computeResources:
              requests: { cpu: "250m", memory: "256Mi" }
              limits: { cpu: "1", memory: "512Mi" }
            env:
              - name: DOCKER_CONFIG
                value: /helm-docker
              - name: HELM_REGISTRY_CONFIG
                value: /helm-docker/config.json
            volumeMounts:
              - name: docker-config
                mountPath: /helm-docker
            script: |
              set -eux
              mkdir -p /tmp/charts
              helm package "$(workspaces.source.path)/src" --destination /tmp/charts
              helm push /tmp/charts/model-catalog-*.tgz \
                oci://docker.internal.phis.nl/charts \
                --insecure-skip-tls-verify
      params:
        - name: repo_url
          value: $(params.repo_url)
        - name: revision
          value: $(params.revision)
      workspaces:
        - name: source
          workspace: source
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: model-catalog-build-main-
  namespace: ci
  annotations:
    pipelinesascode.tekton.dev/on-cel-expression: 'event == "push" && (target_branch == "main" || target_branch == "refs/heads/main")'
    pipelinesascode.tekton.dev/max-keep-runs: "5"
spec:
  pipelineRef:
    name: model-catalog-build
  taskRunTemplate:
    serviceAccountName: tekton-runner
    podTemplate:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/gpu-worker
                    operator: Exists
  params:
    - name: repo_url
      value: "{{ repo_url }}"
    - name: revision
      value: "{{ revision }}"
  workspaces:
    - name: source
      emptyDir: {}
