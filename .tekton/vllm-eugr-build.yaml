apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: vllm-eugr-build
  namespace: ci
  annotations:
    description: |
      Build and push a vllm-eugr base image from eugr/spark-vllm-docker.
      Build args VLLM_REF, TORCH_CUDA_ARCH_LIST, FLASHINFER_CUDA_ARCH_LIST are forwarded to the Dockerfile.
      Image tag: docker.internal.phis.nl/vllm-eugr:<vllm_ref>[-tc<torch>][-fic<flashinfer>]
      Idempotent: skips if tag already exists in Nexus.
      Manual usage:
        kubectl apply -f .tekton/vllm-eugr-build.yaml   # update pipeline definition
        kubectl create -f .tekton/vllm-eugr-run.yaml    # trigger a new build run
      Automatic: PAC triggers this pipeline when versions.env changes on main.
        vllm_ref is read from VLLM_REF in versions.env when revision is provided.
spec:
  params:
    - name: revision
      type: string
      default: ""
      description: git revision of model-catalog (set by PAC); when non-empty, vllm_ref is read from versions.env
    - name: repo_ref
      type: string
      default: "main"
      description: git ref to check out from eugr/spark-vllm-docker
    - name: vllm_ref
      type: string
      default: ""
      description: passed as VLLM_REF build-arg; read from versions.env when empty and revision is set
    - name: torch_cuda_arch_list
      type: string
      default: ""
      description: passed as TORCH_CUDA_ARCH_LIST build-arg if non-empty; appended as -tc<value> in image tag
    - name: flashinfer_cuda_arch_list
      type: string
      default: ""
      description: passed as FLASHINFER_CUDA_ARCH_LIST build-arg if non-empty; appended as -fic<value> in image tag
  workspaces:
    - name: eugr
  results:
    - name: image
      description: vllm-eugr image label (always set, even when skipped)
      value: $(tasks.check-and-prepare.results.image)
  tasks:
    - name: check-and-prepare
      taskSpec:
        params:
          - name: revision
            type: string
          - name: repo_ref
            type: string
          - name: vllm_ref
            type: string
          - name: torch_cuda_arch_list
            type: string
          - name: flashinfer_cuda_arch_list
            type: string
        workspaces:
          - name: eugr
        volumes:
          - name: github-app
            secret:
              secretName: ci-github-app
          - name: github-helper
            configMap:
              name: github-app-helper
              defaultMode: 0755
          - name: docker-config
            secret:
              secretName: docker-internal-registry
              items:
                - key: .dockerconfigjson
                  path: config.json
        results:
          - name: image
            description: Computed vllm-eugr image label
          - name: skip
            description: "'true' if image already exists in nexus, 'false' if build is needed"
        steps:
          - name: check
            image: alpine/git:2.45.2
            computeResources:
              requests: { cpu: "250m", memory: "256Mi" }
              limits: { cpu: "1", memory: "1Gi" }
            volumeMounts:
              - name: github-app
                mountPath: /var/secrets/github-app
              - name: github-helper
                mountPath: /helpers
              - name: docker-config
                mountPath: /docker-config
            script: |
              set -eux
              apk add --no-cache openssl curl jq python3 git >/dev/null 2>&1

              mkdir -p "$(workspaces.eugr.path)/meta"
              : > "$(workspaces.eugr.path)/meta/image"
              : > "$(workspaces.eugr.path)/meta/vllm_ref"
              : > "$(workspaces.eugr.path)/meta/torch_cuda_arch_list"
              : > "$(workspaces.eugr.path)/meta/flashinfer_cuda_arch_list"
              : > "$(workspaces.eugr.path)/meta/skip"

              VLLM_REF="$(params.vllm_ref)"
              REVISION="$(params.revision)"

              if [ -z "${VLLM_REF}" ] && [ -n "${REVISION}" ]; then
                TOKEN=$(/helpers/github-app-token.sh /var/secrets/github-app)
                git clone "https://x-access-token:${TOKEN}@github.com/paulharkink/model-catalog.git" /tmp/source-repo >/dev/null 2>&1
                cd /tmp/source-repo && git checkout "${REVISION}" >/dev/null 2>&1
                . /tmp/source-repo/versions.env
                cd /
              fi

              TORCH="$(params.torch_cuda_arch_list)"
              FLASHINFER="$(params.flashinfer_cuda_arch_list)"

              # Build image tag slug
              SLUG="${VLLM_REF}"
              [ -n "${TORCH}" ]      && SLUG="${SLUG}-tc${TORCH}"
              [ -n "${FLASHINFER}" ] && SLUG="${SLUG}-fic${FLASHINFER}"

              IMAGE="docker.internal.phis.nl/vllm-eugr:${SLUG}"
              printf '%s' "${IMAGE}" > /tekton/results/image

              printf '%s\n' "${IMAGE}"      > "$(workspaces.eugr.path)/meta/image"
              printf '%s\n' "${VLLM_REF}"   > "$(workspaces.eugr.path)/meta/vllm_ref"
              printf '%s\n' "${TORCH}"      > "$(workspaces.eugr.path)/meta/torch_cuda_arch_list"
              printf '%s\n' "${FLASHINFER}" > "$(workspaces.eugr.path)/meta/flashinfer_cuda_arch_list"

              AUTH=$(python3 -c "import json; d=json.load(open('/docker-config/config.json')); print(d['auths']['docker.internal.phis.nl']['auth'])" 2>/dev/null || echo "")
              STATUS="000"
              if [ -n "${AUTH}" ]; then
                STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
                  -H "Authorization: Basic ${AUTH}" \
                  -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
                  "https://docker.internal.phis.nl/v2/vllm-eugr/manifests/${SLUG}" 2>/dev/null || echo "000")
              fi

              if [ "${STATUS}" = "200" ]; then
                echo "Image ${IMAGE} already exists in nexus, skipping build."
                printf 'true' > /tekton/results/skip
                printf 'true\n' > "$(workspaces.eugr.path)/meta/skip"
                exit 0
              fi

              printf 'false' > /tekton/results/skip
              printf 'false\n' > "$(workspaces.eugr.path)/meta/skip"

              TOKEN=$(/helpers/github-app-token.sh /var/secrets/github-app)
              rm -rf "$(workspaces.eugr.path)/src"
              git clone "https://x-access-token:${TOKEN}@github.com/eugr/spark-vllm-docker.git" \
                "$(workspaces.eugr.path)/src"
              cd "$(workspaces.eugr.path)/src"
              git checkout "$(params.repo_ref)"

              # Download prebuilt wheels into src/wheels/ so the Dockerfile bind-mount finds them
              mkdir -p wheels
              for TAG in prebuilt-flashinfer-current prebuilt-vllm-current; do
                curl -sf \
                  -H "Authorization: token ${TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/eugr/spark-vllm-docker/releases/tags/${TAG}" \
                | jq -r '.assets[] | select(.name | endswith(".whl")) | .browser_download_url + " " + .name' \
                | while IFS=' ' read -r URL NAME; do
                    echo "Downloading ${NAME}"
                    curl -sL -H "Authorization: token ${TOKEN}" -o "wheels/${NAME}" "${URL}"
                  done
              done

              BASE_IMAGE=$(grep -m1 '^FROM .* AS runner' Dockerfile | awk '{print $2}')
              REPO_COMMIT=$(git rev-parse HEAD)
              BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              GPU_ARCH="${TORCH:-12.1a}"
              printf 'build_date: %s\n'            "${BUILD_DATE}"       > build-metadata.yaml
              printf 'build_script_commit: %s\n'   "${REPO_COMMIT}"     >> build-metadata.yaml
              printf 'vllm_version: %s\n'          "${VLLM_REF}"        >> build-metadata.yaml
              printf 'vllm_commit: unknown\n'                            >> build-metadata.yaml
              printf 'flashinfer_commit: unknown\n'                      >> build-metadata.yaml
              printf 'gpu_arch: %s\n'              "${GPU_ARCH}"         >> build-metadata.yaml
              printf 'base_image: %s\n'            "${BASE_IMAGE}"       >> build-metadata.yaml
              printf 'build_args:\n'                                      >> build-metadata.yaml
              printf '  vllm_ref: %s\n'            "${VLLM_REF}"        >> build-metadata.yaml
              printf '  transformers_5: false\n'                         >> build-metadata.yaml
              printf '  exp_mxfp4: false\n'                              >> build-metadata.yaml
              printf '  vllm_prs: ""\n'                                  >> build-metadata.yaml
              printf '  build_jobs: 16\n'                                >> build-metadata.yaml
      params:
        - name: revision
          value: $(params.revision)
        - name: repo_ref
          value: $(params.repo_ref)
        - name: vllm_ref
          value: $(params.vllm_ref)
        - name: torch_cuda_arch_list
          value: $(params.torch_cuda_arch_list)
        - name: flashinfer_cuda_arch_list
          value: $(params.flashinfer_cuda_arch_list)
      workspaces:
        - name: eugr
          workspace: eugr

    - name: buildkit-build
      when:
        - input: $(tasks.check-and-prepare.results.skip)
          operator: in
          values: ["false"]
      runAfter: [check-and-prepare]
      taskSpec:
        workspaces:
          - name: eugr
        volumes:
          - name: docker-config
            secret:
              secretName: docker-internal-registry
              items:
                - key: .dockerconfigjson
                  path: config.json
        steps:
          - name: build
            image: moby/buildkit:latest
            securityContext:
              privileged: true
            computeResources:
              requests: { cpu: "4", memory: "16Gi" }
              limits: { cpu: "8", memory: "32Gi" }
            timeout: 5400s
            env:
              - name: DOCKER_CONFIG
                value: /docker-config
            volumeMounts:
              - name: docker-config
                mountPath: /docker-config
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eu
                IMAGE=$(cat "$(workspaces.eugr.path)/meta/image")
                VLLM_REF=$(cat "$(workspaces.eugr.path)/meta/vllm_ref")
                TORCH=$(cat "$(workspaces.eugr.path)/meta/torch_cuda_arch_list")
                FLASHINFER=$(cat "$(workspaces.eugr.path)/meta/flashinfer_cuda_arch_list")

                set -- \
                  --frontend=dockerfile.v0 \
                  "--local=context=$(workspaces.eugr.path)/src" \
                  "--local=dockerfile=$(workspaces.eugr.path)/src" \
                  "--output=type=image,name=${IMAGE},push=true,registry.insecure=true"
                [ -n "${VLLM_REF}" ]   && set -- "$@" "--opt=build-arg:VLLM_REF=${VLLM_REF}"
                [ -n "${TORCH}" ]      && set -- "$@" "--opt=build-arg:TORCH_CUDA_ARCH_LIST=${TORCH}"
                [ -n "${FLASHINFER}" ] && set -- "$@" "--opt=build-arg:FLASHINFER_CUDA_ARCH_LIST=${FLASHINFER}"

                buildctl-daemonless.sh build "$@"

      workspaces:
        - name: eugr
          workspace: eugr
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: vllm-eugr-build-
  namespace: ci
  annotations:
    pipelinesascode.tekton.dev/on-cel-expression: 'event == "push" && target_branch == "main" && files.any(x, x == "versions.env")'
    pipelinesascode.tekton.dev/max-keep-runs: "3"
spec:
  pipelineRef:
    name: vllm-eugr-build
  taskRunTemplate:
    serviceAccountName: tekton-runner
    podTemplate:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["sparky"]
  params:
    - name: revision
      value: "{{ revision }}"
  workspaces:
    - name: eugr
      persistentVolumeClaim:
        claimName: vllm-eugr-workspace
